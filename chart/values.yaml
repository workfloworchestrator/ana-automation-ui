resources: {}
  # limits:
  #   cpu: 100m
  #   memory: 64Mi
  # requests:
  #   cpu: 10m
  #   memory: 32Mi

# HTTPRoute resources (Envoy Gateway / Gateway API).
# Each entry in `routes` renders a separate HTTPRoute resource, so policies
# can target individual routes. `nameSuffix` is appended to the fullname for
# all routes after the first (the primary route omits it).
httpRoute:
  enabled: false
  routes: []
    # - parentRefs:
    #     - name: gateway
    #       sectionName: http
    #   hostnames:
    #     - chart-example.local
    #   rules:
    #     - matches:
    #         - path:
    #             type: PathPrefix
    #             value: /
    #       backendRefs:
    #         - name: some-backend
    #           port: 80
    #           weight: 1
    # - nameSuffix: oauth2
    #   parentRefs:
    #     - name: gateway
    #       sectionName: http
    #   hostnames:
    #     - chart-example.local
    #   rules:
    #     - matches:
    #         - path:
    #             type: PathPrefix
    #             value: /oauth2

# Azure Key Vault integration via the Secrets Store CSI driver.
# When enabled, a SecretProviderClass is created and a CSI volume is mounted
# on the pod (triggering the driver to sync). The synced Kubernetes Secret is
# named "<release>-secret" and consumed by oauth2-proxy via existingSecret.
secretProviderClass:
  enabled: false
  provider: azure
  keyVaultName: ""
  tenantId: ""
  nodePublishSecretRefName: "kv-sp-secret"
  objects: []
    # - key: client-id
    #   objectName: ana-automation-ui-development-oidc-client-id
    # - key: client-secret
    #   objectName: ana-automation-ui-development-oidc-client-secret
    # - key: cookie-secret
    #   objectName: ana-automation-ui-development-cookie-secret

# OIDC group names forwarded by oauth2-proxy (X-Auth-Request-Groups). The portal uses
# these to decide which apps a user may open; operators is a superset of users.
groups:
  users: users
  operators: operators

# Portal apps shown on the landing page. Rendered into a ConfigMap and mounted at
# /config/apps.json; when empty, the image's bundled default app list is used.
# requiredGroup must match the ingress enforcement for that backend (see backends).
portal:
  apps: []
    # - name: AuRA
    #   description: NSI user provider agent for managing reservations.
    #   url: /aura/
    #   requiredGroup: operators
    # - name: DDS
    #   description: Topology document registry.
    #   url: /dds/portal
    # - name: Orchestrator
    #   description: Lifecycle management of multi-domain services.
    #   comingSoon: true

# Access-request email feature. When enabled, a signed-in user who is in neither the
# users nor operators group can email a request for access to "recipient" via the
# cluster SMTP relay. By default the mail is sent from a fixed authenticated sender
# ("from") with the requester in Reply-To, which survives relay SPF/sender checks;
# set fromUser: true to send From the requester's own address (may be rejected).
email:
  enabled: false
  from: ""                # fixed sender address used as From
  fromUser: false         # use the requester's email as From instead
  recipient: ""           # where access requests are delivered
  smtp:
    host: ""
    port: 25
    security: none        # none | starttls | tls
    username: ""          # optional SMTP auth username
    passwordSecret:       # optional; can point at the CSI-synced "<release>-secret"
      name: ""
      key: ""
