{{- if .Values.ingress.enabled -}}
{{/*
  Main ingress for the landing page (path /)
*/}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "ana-automation-ui.fullname" . }}
  labels:
    {{- include "ana-automation-ui.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "ana-automation-ui.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}
---
{{/*
  Per-backend ingresses with path rewriting.
  Each backend needs its own Ingress because rewrite-target
  is an Ingress-level annotation, not per-path.
*/}}
{{- range .Values.backends }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "ana-automation-ui.fullname" $ }}-{{ .name }}
  labels:
    {{- include "ana-automation-ui.labels" $ | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: {{ .rewriteTarget | default (printf "/%s" `$1`) }}
    {{- with $.Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- with .annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- with $.Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if $.Values.ingress.tls }}
  tls:
    {{- range $.Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    - host: {{ $.Values.ingress.host | quote }}
      http:
        paths:
          - path: /{{ .name }}/(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ .serviceName }}
                port:
                  number: {{ .servicePort }}
---
{{- end }}
