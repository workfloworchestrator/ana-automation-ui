apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ana-automation-ui.fullname" . }}
  labels:
    {{- include "ana-automation-ui.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ana-automation-ui.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Roll the pod when the apps ConfigMap changes; a ConfigMap edit alone doesn't
        # change the pod template, so nothing would restart otherwise.
        checksum/apps-config: {{ include (print $.Template.BasePath "/configmap-apps.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "ana-automation-ui.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: LOG_LEVEL
              value: {{ .Values.logLevel | quote }}
            - name: EMAIL_ENABLED
              value: {{ .Values.email.enabled | quote }}
            {{- if .Values.email.enabled }}
            - name: SMTP_HOST
              value: {{ .Values.email.smtp.host | quote }}
            - name: SMTP_PORT
              value: {{ .Values.email.smtp.port | quote }}
            - name: SMTP_SECURITY
              value: {{ .Values.email.smtp.security | quote }}
            {{- with .Values.email.smtp.username }}
            - name: SMTP_USERNAME
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.email.smtp.passwordSecret }}
            {{- if .name }}
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .name }}
                  key: {{ .key }}
            {{- end }}
            {{- end }}
            - name: ACCESS_REQUEST_RECIPIENT
              value: {{ .Values.email.recipient | quote }}
            - name: ACCESS_REQUEST_FROM
              value: {{ .Values.email.from | quote }}
            - name: ACCESS_REQUEST_FROM_USER
              value: {{ .Values.email.fromUser | quote }}
            {{- end }}
            - name: USERS_GROUP
              value: {{ .Values.groups.users | quote }}
            - name: OPERATORS_GROUP
              value: {{ .Values.groups.operators | quote }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if or .Values.portal.apps .Values.secretProviderClass.enabled }}
          volumeMounts:
            {{- if .Values.portal.apps }}
            - name: apps-config
              mountPath: /config
              readOnly: true
            {{- end }}
            {{- if .Values.secretProviderClass.enabled }}
            - name: secret-store
              mountPath: /mnt/secrets-store
              readOnly: true
            {{- end }}
          {{- end }}
      {{- if or .Values.portal.apps .Values.secretProviderClass.enabled }}
      volumes:
        {{- if .Values.portal.apps }}
        - name: apps-config
          configMap:
            name: {{ include "ana-automation-ui.fullname" . }}-apps
        {{- end }}
        {{- if .Values.secretProviderClass.enabled }}
        - name: secret-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: {{ .Release.Name }}-secretproviderclass
            nodePublishSecretRef:
              name: {{ .Values.secretProviderClass.nodePublishSecretRefName }}
        {{- end }}
      {{- end }}
