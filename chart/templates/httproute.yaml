{{- if .Values.httpRoute.enabled -}}
{{- $fullName := include "ana-automation-ui.fullname" . -}}
{{- $svcPort := .Values.service.port -}}
{{- range $i, $route := .Values.httpRoute.routes }}
{{- if $i }}
---
{{- end }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullName }}{{ with $route.nameSuffix }}-{{ . }}{{ end }}
  labels:
    {{- include "ana-automation-ui.labels" $ | nindent 4 }}
  {{- with $route.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- with $route.parentRefs }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with $route.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- range $route.rules }}
    {{- with .matches }}
    - matches:
      {{- toYaml . | nindent 8 }}
    {{- end }}
    {{- with .filters }}
      filters:
      {{- toYaml . | nindent 8 }}
    {{- end }}
      backendRefs:
      {{- if .backendRefs }}
        {{- toYaml .backendRefs | nindent 8 }}
      {{- else }}
        - name: {{ $fullName }}
          port: {{ $svcPort }}
          weight: 1
      {{- end }}
    {{- end }}
{{- end }}
{{- end }}
